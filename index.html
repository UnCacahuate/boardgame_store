<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="shortcut icon" href="./assets/img/fuego.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/5bcaf189f3.js" crossorigin="anonymous"></script>
    <title>Sorcerer Store</title>
</head>
<body>
    <nav>
        <div class="header">
            <!-- Logo derecho -->
            <div class="logo">
                <i class="fa-solid fa-wand-sparkles fa-2xl"></i>
                <div>
                    <h1>Sorcerer</h1>
                    <p>store</p>
                </div>
            </div>
            <!-- Hamburger Menu -->
            <div class="menu-options">
                <p>Inicio</p>
                <p>Catálogo</p>
                <p>Ofertas</p>
                <p>Contacto</p>
            </div>
            <i class="fa-solid fa-bars fa-2xl"></i>
        </div>
    </nav>

    <section>
        <div class="sectionbox">
            <p>Ordenar por:</p>

            <!-- Buscador desplegable -->
            <div class="buscador">
                <p>Precio</p>
                <i class="fa-solid fa-sort-down"></i>
            </div>
        </div>
    </section>
    <main>

        <!-- grilla de productos -->
        <div class="product-grid">
            <!-- Tarjeta e info -->
            <article class="card">
                <img class="card-img" src="./assets/img/juego_01.jpg" alt="">
                <p class="card-info"> Cthulhu</p>
                <button class="card-button">Ver más</button>
            </article>
            <!--  -->
            <article class="card">
                <img class="card-img" src="./assets/img/juego_02.jpg" alt="">
                <p class="card-info">Vantage</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_03.jpg" alt="">
                <p class="card-info">Hues and cues</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_04.jpg" alt="">
                <p class="card-info">Cómo conocí a tu serie</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_05.jpg" alt="">
                <p class="card-info"> Finspan</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_06.jpg" alt="">
                <p class="card-info">Frost Punk</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_07.jpg" alt="">
                <p class="card-info">Evergreen</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="./assets/img/juego_08.jpg" alt="">
                <p class="card-info">Catchables</p>
                <button class="card-button">Ver más</button>
            </article>
        </div>

        <!-- Navegador de las paginas-->
        <div class="page-scroll">
            <p class="page-button r-border">&lt;&lt;</p>
            <p class="page-button r-border">1</p>
            <p class="page-button r-border">2</p>
            <p class="page-button r-border">3</p>
            <p class="page-button">&gt;&gt;</p>
        </div>
    </main>
    <footer>
        <!-- Iconos -->
        <div class="rrss">
            <i class="fa-brands fa-square-facebook fa-xl"></i>
            <i class="fa-brands fa-instagram fa-xl"></i>
            <i class="fa-brands fa-tiktok fa-xl"></i>
        </div>

        <!-- Texto final -->
        <p>Todos los derechos reservados</p>
    </footer>
</body>
</html>
